name: Build artifacts (manual)

on:
  workflow_dispatch:
    inputs:
      libghostty_optimize:
        description: libghostty-vt optimize mode for this build
        required: true
        default: ReleaseSafe
        type: choice
        options:
          - ReleaseSafe
          - ReleaseFast
          - ReleaseSmall
          - Debug
      libghostty_simd:
        description: build libghostty-vt with SIMD-accelerated code paths
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      LIBGHOSTTY_VT_OPTIMIZE: ${{ inputs.libghostty_optimize }}
      LIBGHOSTTY_VT_SIMD: ${{ inputs.libghostty_simd }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Prefer official Ubuntu mirrors over Azure
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            sudo sed -i '/azure.archive.ubuntu.com/d' /etc/apt/apt-mirrors.txt
            echo "Using apt mirrors:"
            cat /etc/apt/apt-mirrors.txt
          fi

      - name: Install Linux build tools
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure-cli*' \) -print -delete
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build musl-tools

      - name: Remove Zig caches
        run: rm -rf .zig-cache vendor/libghostty-vt/.zig-cache vendor/libghostty-vt/zig-out

      - name: Build
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Package artifact
        run: |
          cp target/x86_64-unknown-linux-musl/release/herdr herdr-linux-x86_64
          file herdr-linux-x86_64 > BUILD_INFO.txt
          ldd herdr-linux-x86_64 2>&1 | tee -a BUILD_INFO.txt
          grep -q "statically linked" BUILD_INFO.txt
          if nm -u herdr-linux-x86_64 2>/dev/null | grep -E '(__cxa|GLIBCXX|CXXABI|_ZSt)'; then
            echo "error: Linux artifact has unresolved C++ runtime symbols" >&2
            exit 1
          fi
          {
            echo "commit=$GITHUB_SHA"
            echo "target=x86_64-unknown-linux-musl"
            echo "libghostty_vt_optimize=$LIBGHOSTTY_VT_OPTIMIZE"
            echo "libghostty_vt_simd=$LIBGHOSTTY_VT_SIMD"
          } >> BUILD_INFO.txt
          python3 -c "import hashlib, pathlib; artifact = pathlib.Path('herdr-linux-x86_64'); print(f'sha256={hashlib.sha256(artifact.read_bytes()).hexdigest()}  {artifact.name}')" >> BUILD_INFO.txt

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: herdr-linux-x86_64-${{ inputs.libghostty_optimize }}-simd-${{ inputs.libghostty_simd }}
          path: |
            herdr-linux-x86_64
            BUILD_INFO.txt
          retention-days: 7
