name: PR 10 target installation fix

on:
  push:
    branches:
      - release/v0.7.4
    paths:
      - .github/workflows/pr10-target-install.yml

permissions:
  contents: read

concurrency:
  group: pr10-target-install
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch:
    name: Patch Rust target installation
    permissions:
      contents: write # Pushes only the validated workflow corrections.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: release/v0.7.4
          fetch-depth: 0
          persist-credentials: false

      - name: Add explicit rustup target installation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          target_expr = chr(36) + "{{ matrix.target }}"
          needle = f"          targets: {target_expr}\n\n"
          insertion = (
              needle
              + "      - name: Install Rust target\n"
              + f'        run: rustup target add "{target_expr}"\n\n'
          )

          for filename in (
              ".github/workflows/ci.yml",
              ".github/workflows/release.yml",
          ):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              if text.count(needle) != 1:
                  raise SystemExit(f"{filename}: expected exactly one target block")
              updated = text.replace(needle, insertion, 1)
              expected = f'rustup target add "{target_expr}"'
              if updated.count(expected) != 1:
                  raise SystemExit(f"{filename}: explicit target install missing or duplicated")
              path.write_text(updated, encoding="utf-8")
          PY

      - name: Validate workflow diffs
        run: |
          git diff --check
          git diff -- .github/workflows/ci.yml .github/workflows/release.yml

      - name: Commit workflow correction
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add .github/workflows/ci.yml .github/workflows/release.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: install release targets explicitly"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:release/v0.7.4
