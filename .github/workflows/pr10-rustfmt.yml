name: PR 10 rustfmt normalization

on:
  push:
    branches:
      - release/v0.7.4
    paths:
      - .github/workflows/pr10-rustfmt.yml

permissions:
  contents: read

concurrency:
  group: pr10-rustfmt-normalization
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    name: Normalize Rust formatting
    permissions:
      contents: write # Pushes only deterministic rustfmt output.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: release/v0.7.4
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Apply rustfmt
        run: cargo fmt --all

      - name: Verify only Rust source changed
        run: |
          python3 - <<'PY'
          import subprocess

          changed = subprocess.check_output(
              ["git", "diff", "--name-only", "--diff-filter=ACMRTUXB"],
              text=True,
          ).splitlines()
          if not changed:
              raise SystemExit("rustfmt produced no changes")
          unexpected = [path for path in changed if not path.endswith(".rs")]
          if unexpected:
              raise SystemExit(f"unexpected non-Rust changes: {unexpected}")
          print("rustfmt files:")
          print("\n".join(changed))
          PY
          git diff --check
          cargo fmt --all -- --check

      - name: Commit formatting
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -- '*.rs'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "style: normalize Rust formatting for v0.7.4"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:release/v0.7.4
