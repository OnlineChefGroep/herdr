name: Maintainer Patch Lane

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Existing branch to patch
        required: true
        type: string
      reset_to_master:
        description: Rebuild the branch from current master before patching
        required: true
        default: false
        type: boolean
      patch_script_b64:
        description: Base64-encoded Python patch script
        required: true
        type: string
      commit_message:
        description: Commit message
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: maintainer-patch-${{ inputs.target_branch }}
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate target ref
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          git check-ref-format --branch "$TARGET_BRANCH" >/dev/null
          case "$TARGET_BRANCH" in
            master|main) echo "Refusing to patch the default branch" >&2; exit 1 ;;
          esac

      - name: Check out target branch
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Apply patch
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          RESET_TO_MASTER: ${{ inputs.reset_to_master }}
          PATCH_SCRIPT_B64: ${{ inputs.patch_script_b64 }}
        run: |
          set -euo pipefail
          previous_head=$(git rev-parse HEAD)
          git fetch --no-tags origin master "$TARGET_BRANCH"
          if [ "$RESET_TO_MASTER" = "true" ]; then
            git reset --hard origin/master
          fi
          printf '%s' "$PATCH_SCRIPT_B64" | base64 --decode > "$RUNNER_TEMP/maintainer_patch.py"
          python3 "$RUNNER_TEMP/maintainer_patch.py"
          cargo fmt --all
          git diff --check
          git add --all
          if git diff --cached --quiet; then
            echo "Patch produced no changes"
            exit 0
          fi
          git config user.name "onlinechef-maintainer[bot]"
          git config user.email "onlinechef-maintainer[bot]@users.noreply.github.com"
          git commit -m "${{ inputs.commit_message }}"
          if [ "$RESET_TO_MASTER" = "true" ]; then
            git push --force-with-lease="refs/heads/$TARGET_BRANCH:$previous_head" origin "HEAD:refs/heads/$TARGET_BRANCH"
          else
            git push origin "HEAD:refs/heads/$TARGET_BRANCH"
          fi
