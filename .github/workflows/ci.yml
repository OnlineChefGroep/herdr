name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN_VERSION: 1.96.1
  ZIG_VERSION: 0.15.2
  BUN_VERSION: 1.3.14

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Rust tools
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: cargo-nextest

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cargo nextest
        run: cargo nextest run --locked --status-level fail --final-status-level fail --failure-output final --success-output never

  maintenance:
    name: Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Python maintenance unittests
        run: python3 -m unittest scripts.test_agent_detection_manifest_check scripts.test_changelog scripts.test_ci_quality scripts.test_config_reference_check scripts.test_docs_translation_parity scripts.test_preview scripts.test_vendor_libghostty_vt scripts.test_vendor_portable_pty

      - name: Integration asset tests
        run: |
          bun test src/integration/assets/herdr-agent-state.test.ts
          bun test src/integration/assets/opencode/herdr-agent-state.test.ts

      - name: Plugin marketplace tests
        run: cd workers/plugin-marketplace && bun test

  windows-lint:
    name: Windows lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ci-windows-lint

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Windows target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: cargo-xwin

      # Cross-clippy on Linux needs the MSVC sysroot/linker from xwin.
      - name: Cargo clippy for Windows target
        run: LIBGHOSTTY_VT_SIMD=false cargo xwin clippy --bin herdr --locked --target x86_64-pc-windows-msvc -- -D warnings

  release-metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Release metadata consistency
        run: |
          python3 scripts/changelog.py validate-product-announcement
          node --check npm/install.js
          node --check npm/bin/herdr.js
          (cd npm && npm pack --dry-run --ignore-scripts)
          python3 scripts/ci_quality.py check-release-metadata

  release-smoke:
    name: Release smoke build (${{ matrix.target }})
    needs: [lint, test]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: herdr-linux-x86_64
    runs-on: ${{ matrix.os }}
    env:
      LIBGHOSTTY_VT_OPTIMIZE: ReleaseFast
      LIBGHOSTTY_VT_SIMD: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Prefer official Ubuntu mirrors over Azure
        if: runner.os == 'Linux'
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            sudo sed -i '/azure.archive.ubuntu.com/d' /etc/apt/apt-mirrors.txt
          fi

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure-cli*' \) -print -delete
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build musl-tools

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ci-release-smoke-${{ matrix.target }}

      - name: Remove Zig caches
        run: rm -rf .zig-cache vendor/libghostty-vt/.zig-cache vendor/libghostty-vt/zig-out

      # Non-LTO release-profile smoke build; not the exact publish artifact.
      - name: Build release smoke artifact (LTO off)
        run: cargo build --release --locked --target ${{ matrix.target }} --config profile.release.lto=false

      - name: Stage smoke artifact
        run: cp target/${{ matrix.target }}/release/herdr ${{ matrix.artifact }}

      - name: Upload smoke artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-smoke-${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - maintenance
      - windows-lint
      - release-metadata
      - release-smoke
    if: always()
    steps:
      - name: Require all quality jobs
        run: |
          set -euo pipefail
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.test.result }}"
            "${{ needs.maintenance.result }}"
            "${{ needs.windows-lint.result }}"
            "${{ needs.release-metadata.result }}"
            "${{ needs.release-smoke.result }}"
          )
          for result in "${results[@]}"; do
            if [ "$result" != "success" ]; then
              echo "Quality gate failed; job result was: $result"
              exit 1
            fi
          done
          echo "Quality gate passed."
