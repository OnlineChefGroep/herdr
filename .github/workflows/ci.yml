name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'website/**'
      - 'docs/**'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'website/**'
      - 'docs/**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN_VERSION: 1.96.1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Release metadata consistency
        run: |
          python3 scripts/changelog.py validate-product-announcement
          node --check npm/install.js
          node --check npm/bin/herdr.js
          (cd npm && npm pack --dry-run --ignore-scripts)
          python3 - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          cargo = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          version = cargo["package"]["version"]
          package = json.loads(Path("npm/package.json").read_text(encoding="utf-8"))
          installer = Path("npm/install.js").read_text(encoding="utf-8")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          gateway = Path("src/bin/herdr-gateway.rs").read_text(encoding="utf-8")
          release_tools = Path("scripts/changelog.py").read_text(encoding="utf-8")
          npm_readme = Path("npm/README.md").read_text(encoding="utf-8")

          assert package["version"] == version
          assert package["os"] == ["linux"]
          assert f'const VERSION = "{version}";' in installer
          assert f"## [{version}]" in changelog
          assert 'env!("CARGO_PKG_VERSION")' in gateway
          assert 'DEFAULT_RELEASE_REPO = "OnlineChefGroep/herdr"' in release_tools
          assert "RMEOF" not in npm_readme
          for heading in ("### Added", "### Fixed", "### Changed"):
              assert f"{heading}\n\n-" in changelog
          PY

      - name: Cargo check
        run: cargo check --all-targets --locked

      - name: Cargo test
        run: cargo test --all --locked -- --skip graphics_bytes_are_written_after_blit_with_saved_cursor --skip foreground_client_applies_client_keybindings --skip invalid_server_keybindings_apply_valid_subset_after_settings_save_without_caching_local_keybindings --skip local_keybinding_client_keeps_local_keybindings_after_settings_save --skip pane_border_renderer_places_adjacent_cjk_by_display_width

      - name: Cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  release-build:
    name: Release build (${{ matrix.target }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: herdr-linux-x86_64
    runs-on: ${{ matrix.os }}
    env:
      LIBGHOSTTY_VT_OPTIMIZE: ReleaseFast
      LIBGHOSTTY_VT_SIMD: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Prefer official Ubuntu mirrors over Azure
        if: runner.os == 'Linux'
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            sudo sed -i '/azure.archive.ubuntu.com/d' /etc/apt/apt-mirrors.txt
          fi

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*microsoft*' -o -iname '*azure-cli*' \) -print -delete
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build musl-tools

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ci-release-${{ matrix.target }}

      - name: Remove Zig caches
        run: rm -rf .zig-cache vendor/libghostty-vt/.zig-cache vendor/libghostty-vt/zig-out

      - name: Build exact release artifact
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/herdr ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7
