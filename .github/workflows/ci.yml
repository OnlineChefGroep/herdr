name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Zig
        uses: mlugg/setup-zig@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo test
        run: cargo test --all

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

  build:
    name: Build (${{ matrix.target.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-latest, name: x86_64-unknown-linux-gnu }
          - { os: macos-latest, name: aarch64-apple-darwin }
          - { os: windows-latest, name: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.name }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Zig
        uses: mlugg/setup-zig@v1

      - name: Install Linux deps
        if: matrix.target.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cargo build (release)
        run: cargo build --release --target ${{ matrix.target.name }}

      - name: Strip binary (Unix)
        if: matrix.target.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target.name }}/release/herdr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: herdr-${{ matrix.target.name }}
          path: |
            target/${{ matrix.target.name }}/release/herdr
            target/${{ matrix.target.name }}/release/herdr.exe
          retention-days: 30
