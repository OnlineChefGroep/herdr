name: PR 10 runtime hardening

on:
  push:
    branches:
      - release/v0.7.4
    paths:
      - .github/workflows/pr10-runtime-hardening.yml

permissions:
  contents: read

concurrency:
  group: pr10-runtime-hardening
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUSTFLAGS: "-D warnings"

jobs:
  harden:
    name: Harden direct attach
    permissions:
      contents: write # Pushes only the validated src/client/mod.rs change.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: release/v0.7.4
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Apply runtime hardening
        run: python3 .github/maintainer/patch_pr10_runtime.py

      - name: Format
        run: cargo fmt --all

      - name: Check all targets
        run: cargo check --all-targets --locked

      - name: Test direct attach
        run: cargo test --locked attach_escape

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Verify patch cleanliness
        run: git diff --check

      - name: Commit source hardening
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add src/client/mod.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: make direct-attach prefix parsing bounded and linear"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:release/v0.7.4
