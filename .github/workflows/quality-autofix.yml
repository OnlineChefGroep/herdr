name: Quality autofix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to autofix
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN_VERSION: 1.96.1

jobs:
  autofix:
    name: Mechanical quality autofix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.event == 'pull_request'
      )
    steps:
      - name: Resolve pull request
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request

          event_name = os.environ["EVENT_NAME"]
          repository = os.environ["REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]

          def output(name, value):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
                  handle.write(f"{name}={value}\n")

          def github_api(path):
              request = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          if event_name == "workflow_run":
              with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as handle:
                  event = json.load(handle)
              pull_requests = event["workflow_run"].get("pull_requests") or []
              if not pull_requests:
                  output("skip", "true")
                  output("skip_reason", "workflow run has no pull request")
                  raise SystemExit(0)
              pr_number = str(pull_requests[0]["number"])
              head_sha = event["workflow_run"]["head_sha"]
          else:
              pr_number = os.environ["PR_NUMBER"]
              head_sha = ""

          pr = github_api(f"/repos/{repository}/pulls/{pr_number}")
          head = pr["head"]
          head_repo = head["repo"]["full_name"]
          if head_repo != repository:
              output("skip", "true")
              output("skip_reason", f"fork pull request: {head_repo}")
              raise SystemExit(0)

          output("skip", "false")
          output("number", pr_number)
          output("head_branch", head["ref"])
          output("head_sha", head_sha or head["sha"])
          output("skip_reason", "")
          PY

      - name: Report skipped pull request
        if: steps.pr.outputs.skip == 'true'
        run: echo "Skipping autofix: ${{ steps.pr.outputs.skip_reason }}"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: steps.pr.outputs.skip != 'true'
        with:
          repository: ${{ github.repository }}
          ref: ${{ steps.pr.outputs.head_branch }}
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Check autofix guard
        id: guard
        if: steps.pr.outputs.skip != 'true'
        env:
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          latest_subject="$(git log -1 --pretty=%s)"
          case "$latest_subject" in
            "ci: autofix"*)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "skip_reason=latest commit is already an autofix" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if git log --format=%B | grep -F "Autofix-Source-SHA: $HEAD_SHA" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=already autofixed $HEAD_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"

      - name: Report skipped autofix
        if: steps.pr.outputs.skip != 'true' && steps.guard.outputs.skip == 'true'
        run: echo "Skipping autofix: ${{ steps.guard.outputs.skip_reason }}"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: steps.pr.outputs.skip != 'true' && steps.guard.outputs.skip != 'true'
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt

      - name: Install Zig
        if: steps.pr.outputs.skip != 'true' && steps.guard.outputs.skip != 'true'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Apply mechanical fixes
        if: steps.pr.outputs.skip != 'true' && steps.guard.outputs.skip != 'true'
        run: |
          python3 scripts/ci_quality.py sync-release-metadata
          cargo fmt --all

      - name: Commit and push changes
        if: steps.pr.outputs.skip != 'true' && steps.guard.outputs.skip != 'true'
        env:
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          if git diff --quiet; then
            echo "No mechanical quality changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit \
            -m "ci: autofix mechanical quality" \
            -m "Autofix-Source-SHA: $HEAD_SHA"
          git push origin "HEAD:$HEAD_BRANCH"
