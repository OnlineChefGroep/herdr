name: Nix

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/nix.yml"
      - "assets/**"
      - "build.rs"
      - "Cargo.lock"
      - "Cargo.toml"
      - "flake.lock"
      - "flake.nix"
      - "nix/**"
      - "vendor/**"
  push:
    branches: [master]
    paths:
      - ".github/workflows/nix.yml"
      - "assets/**"
      - "build.rs"
      - "Cargo.lock"
      - "Cargo.toml"
      - "flake.lock"
      - "flake.nix"
      - "nix/**"
      - "vendor/**"

permissions:
  contents: read

concurrency:
  group: nix-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            always-allow-substitutes = true

      - name: Run Nix flake check
        run: |
          nix flake check --print-build-logs
          nix flake check --all-systems --no-build --print-build-logs
