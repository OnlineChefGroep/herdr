id = "copilot"
version = "2026.07.07.1"
min_engine_version = 1
updated_at = "2026-07-07T14:15:00Z"
aliases = ["github-copilot", "ghcs"]

[[rules]]
id = "selection_blocker"
state = "blocked"
priority = 300
region = "whole_recent"
visible_blocker = true
all = [
  { any = [
    { contains = ["esc to cancel"] },
    { contains = ["esc cancel"] },
  ] },
  { any = [
    { contains = ["enter to select"] },
    { contains = ["enter to confirm"] },
    { contains = ["enter to submit"] },
    { contains = ["enter accept"] },
  ] },
]

[[rules]]
id = "copilot_tool_working"
state = "working"
priority = 95
region = "bottom_non_empty_lines(6)"
visible_working = true
any = [
  { line_regex = ['(?i)(running|executing|applying)\s+(command|tool|edit)'] },
  { line_regex = ['(?i)(ruff|pytest|uv\s+run)'] },
  { line_regex = ['(?i)utrecht\s+(parse|normalize|index|embed|eval|ask|serve)'] },
]

[[rules]]
id = "working_cancel_hint"
state = "working"
priority = 100
region = "whole_recent"
visible_working = true
any = [
  { contains = ["esc to cancel"] },
  { contains = ["esc cancel"] },
  { contains = ["esc again to cancel"] },
  { contains = ["esc interrupt"] }
]
