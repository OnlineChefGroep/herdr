id = "openclaude"
version = "2026.06.29.1"
min_engine_version = 2
updated_at = "2026-06-29T20:28:00Z"
aliases = ["openclaude-cli", "open-claude"]

[[rules]]
id = "osc_title_working"
state = "working"
priority = 1100
region = "osc_title"
visible_working = true
regex = ['^[\x{2800}-\x{28FF}] ']

[[rules]]
id = "live_blocked_form"
state = "blocked"
priority = 980
region = "after_last_horizontal_rule"
visible_blocker = true
contains = ["enter to select", "esc to cancel"]

[[rules]]
id = "live_prompt_box"
state = "idle"
priority = 950
region = "prompt_box_body"
visible_idle = true
line_regex = ['^\s*❯']
not = [
  { contains = ["enter to select"] },
  { contains = ["esc to cancel"] }
]

[[rules]]
id = "bash_permission_prompt"
state = "blocked"
priority = 850
region = "whole_recent"
visible_blocker = true
contains = ["do you want to proceed?"]

[[rules]]
id = "osc_title_idle"
state = "idle"
priority = 250
region = "osc_title"
visible_idle = true
regex = ['^\x{2733} ']
