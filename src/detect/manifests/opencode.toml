id = "opencode"
version = "2026.06.10.1"
min_engine_version = 1
updated_at = "2026-06-10T00:00:00Z"
aliases = ["open-code", "herdr:opencode"]

[[rules]]
id = "permission_required"
state = "blocked"
priority = 300
region = "whole_recent"
visible_blocker = true
any = [
  { contains = ["△ Permission required"] },
  { contains = ["esc dismiss"], any = [{ contains = ["enter confirm"] }, { contains = ["enter submit"] }, { contains = ["enter toggle"] }], all = [{ any = [{ contains = ["↑↓ select"] }, { contains = ["⇆ tab"] }] }] },
]

[[rules]]
id = "interrupt_hint_working"
state = "working"
priority = 110
region = "whole_recent"
visible_working = true
any = [
  { contains = ["esc to interrupt"] },
  { contains = ["ctrl+c to interrupt"] },
  { contains = ["press esc to interrupt"] },
  { line_regex = ['(?i).*opencode.*esc (again to )?interrupt'] },
]

[[rules]]
id = "progress_bar_working"
state = "working"
priority = 100
region = "whole_recent"
visible_working = true
regex = ['(■|⬝){4,}']

[[rules]]
id = "pipeline_working"
state = "working"
priority = 95
region = "bottom_non_empty_lines(8)"
visible_working = true
any = [
  { line_regex = ['(?i)(parse|normalize|index|embed|eval|ingest).*\.{3}'] },
  { line_regex = ['(?i)utrecht\s+(parse|normalize|index|embed|eval|ask|serve)'] },
  { line_regex = ['(?i)(pipeline|cmd|command)\s+(run|exec|start)'] },
]

[[rules]]
id = "fleet_ssh_working"
state = "working"
priority = 93
region = "bottom_non_empty_lines(6)"
visible_working = true
any = [
  { line_regex = ['(?i)ssh\s+\w+.*--'] },
  { line_regex = ['(?i)(fleet|probe|mesh|scan)'] },
]

[[rules]]
id = "ruff_lint_working"
state = "working"
priority = 92
region = "bottom_non_empty_lines(4)"
visible_working = true
any = [
  { line_regex = ['(?i)ruff\s+check'] },
  { line_regex = ['(?i)uv\s+run\s+ruff'] },
]

[[rules]]
id = "eval_gate_working"
state = "working"
priority = 91
region = "bottom_non_empty_lines(6)"
visible_working = true
any = [
  { line_regex = ['(?i)(eval|gate|baseline|threshold)'] },
  { line_regex = ['(?i)test\.py\s+(fast|pr|integration)'] },
]
