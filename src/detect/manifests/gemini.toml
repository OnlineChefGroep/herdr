id = "gemini"
version = "2026.06.10.1"
min_engine_version = 1
updated_at = "2026-06-10T00:00:00Z"

[[rules]]
id = "apply_or_allow_change"
state = "blocked"
priority = 300
region = "whole_recent"
visible_blocker = true
any = [
  { contains = ["│ Apply this change"] },
  { contains = ["│ Allow execution"] },
  { all = [{ contains = ["yes"] }, { any = [{ contains = ["waiting for user confirmation"] }, { contains = ["│ Do you want to proceed"] }, { contains = ["do you want to proceed?"] }] }] },
  { line_regex = ['(?i)^\s*❯.*(yes|allow)'] },
]

[[rules]]
id = "gemini_tool_working"
state = "working"
priority = 95
region = "bottom_non_empty_lines(6)"
visible_working = true
any = [
  { line_regex = ['(?i)(running|executing|applying)\s+(command|tool|edit)'] },
  { line_regex = ['(?i)(ruff|pytest|uv\s+run)'] },
  { line_regex = ['(?i)utrecht\s+(parse|normalize|index|embed|eval|ask|serve)'] },
]

[[rules]]
id = "esc_cancel_working"
state = "working"
priority = 100
region = "whole_recent"
visible_working = true
contains = ["esc to cancel"]
