id = "codex"
version = "2026.06.10.3"
min_engine_version = 2
updated_at = "2026-06-10T00:00:00Z"

[[rules]]
id = "osc_title_blocked"
state = "blocked"
priority = 1100
region = "osc_title"
visible_blocker = true
contains = ["Action Required"]

[[rules]]
id = "osc_title_working"
state = "working"
priority = 1050
region = "osc_title"
visible_working = true
regex = ['^[\x{2800}-\x{28FF}] ']

[[rules]]
id = "transcript_viewer"
state = "unknown"
priority = 1000
region = "after_last_prompt_marker"
skip_state_update = true
contains = ["↑/↓ to scroll", "pgup/pgdn to", "home/end to jump", "q to quit"]
any = [
  { contains = ["esc to edit prev"] },
  { contains = ["esc/← to edit prev"] },
]

[[rules]]
id = "live_strong_blocker"
state = "blocked"
priority = 900
region = "after_last_prompt_marker"
visible_blocker = true
any = [
  { contains = ["press enter to confirm or esc to cancel"] },
  { contains = ["enter to submit answer"] },
  { contains = ["enter to submit all"] },
  { contains = ["allow command?"] },
]

[[rules]]
id = "weak_blocker"
state = "blocked"
priority = 600
region = "whole_recent"
any = [
  { contains = ["[y/n]"] },
  { contains = ["yes (y)"] },
  { contains = ["do you want to"], any = [{ contains = ["yes"] }, { contains = ["❯"] }] },
  { contains = ["would you like to"], any = [{ contains = ["yes"] }, { contains = ["❯"] }] },
]

[[rules]]
id = "codex_tool_working"
state = "working"
priority = 92
region = "bottom_non_empty_lines(6)"
visible_working = true
any = [
  { line_regex = ['(?i)(running|executing|applying)\s+(command|tool|edit)'] },
  { line_regex = ['(?i)(ruff|pytest|uv\s+run)'] },
  { line_regex = ['(?i)utrecht\s+(parse|normalize|index|embed|eval|ask|serve)'] },
  { line_regex = ['(?i)(fleet|probe|mesh)\s+(status|check)'] },
  { line_regex = ['(?i)test\.py\s+(fast|pr|integration)'] },
]

[[rules]]
id = "codex_eval_gate"
state = "working"
priority = 91
region = "bottom_non_empty_lines(4)"
visible_working = true
any = [
  { line_regex = ['(?i)(eval|gate|baseline|threshold)'] },
  { line_regex = ['(?i)ruff\s+check'] },
]

[[rules]]
id = "osc_title_idle"
state = "idle"
priority = 100
region = "osc_title"
visible_idle = true
regex = ['\S']
not = [
  { regex = ['^[\x{2800}-\x{28FF}]'] },
  { contains = ["Action Required"] },
]
